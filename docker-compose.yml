version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: flash_sale_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flash_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flash_password}
      POSTGRES_DB: ${POSTGRES_DB:-flash_sale_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d  # init database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flash_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flash_sale_network

  redis:
    image: redis:7-alpine
    container_name: flash_sale_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flash_sale_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: flash_sale_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbit_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbit_password}
    ports:
      - "5672:5672"   
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flash_sale_network

  nginx:
    image: nginx:alpine
    container_name: flash_sale_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flash_sale_api
    networks:
      - flash_sale_network

  flash_sale_api:
    build: .
    container_name: flash_sale_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    command:
      uvicorn app.main:app --host 0.0.0.0 --port 8000 
    networks:
      - flash_sale_network
  flash_sale_worker:
    build: .
    container_name: flash_sale_worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
    command:
      python3 worker.py
    networks:
      - flash_sale_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  flash_sale_network:
    driver: bridge
